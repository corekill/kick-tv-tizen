# Install as /etc/nginx/conf.d/kicktv-limits.conf.
# The public reverse proxy hides client IPs from this backend, so these are
# deliberate global limits rather than misleading per-IP limits.
limit_req_zone $server_name zone=kicktv_install_global:64k rate=10r/s;
limit_req_zone $server_name zone=kicktv_admin_global:64k rate=30r/m;
