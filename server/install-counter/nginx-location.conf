# Add these exact-match locations to the HTTPS server block for corekill.cz.
# The upstream only sees the local proxy and receives no client headers.
location = /api/kicktv/install {
    access_log off;
    client_max_body_size 1k;
    limit_req zone=kicktv_install_global burst=40 nodelay;
    limit_req_status 429;
    proxy_pass_request_headers off;
    proxy_pass http://127.0.0.1:8787/install;
}

location = /api/kicktv/count {
    access_log off;
    proxy_pass_request_headers off;
    proxy_pass http://127.0.0.1:8787/count;
}

location = /api/kicktv/healthz {
    access_log off;
    proxy_pass_request_headers off;
    proxy_pass http://127.0.0.1:8787/healthz;
}

location = /kicktv-admin {
    return 308 /kicktv-admin/;
}

location = /kicktv-admin/ {
    access_log off;
    auth_basic "Kick TV dashboard";
    auth_basic_user_file /etc/nginx/.kicktv-dashboard.htpasswd;
    auth_delay 1s;
    limit_req zone=kicktv_admin_global burst=5 nodelay;
    limit_req_status 429;
    proxy_pass_request_headers off;
    proxy_pass http://127.0.0.1:8787/dashboard;
}
