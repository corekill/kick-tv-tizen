name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils zip unzip
      - name: Verify tag matches config version
        run: |
          version="$(xmllint --xpath 'string(/*[local-name()="widget"]/@version)' kick-tv/config.xml)"
          test "v$version" = "${GITHUB_REF_NAME}" || {
            echo "Tag ${GITHUB_REF_NAME} does not match config version v$version" >&2
            exit 1
          }
      - name: Build release package
        run: ./scripts/build.sh
      - name: Create checksum
        run: cd dist && sha256sum KickTV.wgt > KickTV.wgt.sha256
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/KickTV.wgt
            dist/KickTV.wgt.sha256
