name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils zip unzip
      - name: Validate and build
        run: ./scripts/build.sh
      - name: Upload device-neutral WGT
        uses: actions/upload-artifact@v4
        with:
          name: KickTV-WGT
          path: dist/KickTV.wgt
